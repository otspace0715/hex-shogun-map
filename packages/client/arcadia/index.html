<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>🏰 アルカディア大陸</title>
  <link rel="stylesheet" href="../css/map.css">
  <style>
    :root {
      --bg: #0a0818;
      --header-bg: rgba(10, 8, 24, 0.95);
      --border: rgba(100, 60, 180, 0.4);
      --accent: #a070ff;
      --status-color: #9060df;
      --btn-bg: rgba(20, 10, 50, 0.8);
      --btn-border: rgba(100, 60, 200, 0.5);
      --btn-color: #c0a0ff;
      --btn-active-bg: rgba(60, 20, 140, 0.9);
      --btn-active-border: rgba(150, 100, 255, 0.8);
    }
  </style>
</head>

<body>
  <div id="header">
    <a href="../" id="ver" style="text-decoration:none">🏰 アルカディア大陸</a>
    <button class="btn active" id="m-fl">○ Flat-top (Tactical)</button>

    <!-- 王国ボタン -->
    <button class="btn prov-btn" data-prov="黄金王国アウロス" data-id="aur" data-color="200,160,40"
      data-autoload="true">黄金王国</button>
    <button class="btn prov-btn" data-prov="銀月王国シルヴァ" data-id="sil" data-color="150,180,200">銀月王国</button>
    <button class="btn prov-btn" data-prov="炎帝国イグニス" data-id="ign" data-color="200,80,40">炎帝国</button>
    <button class="btn prov-btn" data-prov="翠森共和国ヴェルデ" data-id="ver" data-color="60,160,80">翠森共和国</button>
    <button class="btn prov-btn" data-prov="深海神聖マレア" data-id="mar" data-color="40,100,180">深海神聖</button>
    <button class="btn prov-btn" data-prov="暗黒領主ウンブラ" data-id="umb" data-color="80,40,120">暗黒領主</button>

    <button class="btn" id="btn-fit">⊙</button>
    <button class="btn" id="btn-ctrl">⚙ 設定</button>
  </div>
  <div id="status">王国を選んでください</div>

  <!-- コントロールパネル (Modal) -->
  <div id="overlay-bg"></div>
  <div id="ctrl-panel">
    <h2>⚙ システム・表示設定</h2>
    <div class="ctrl-row">
      <label>📅 シミュレーション年度: <span id="val-year">1580</span>年</label>
      <input type="range" id="range-year" min="1500" max="1615" value="1580">
    </div>
    <div class="ctrl-row">
      <label>🍃 季節</label>
      <select id="sel-season">
        <option value="spring">春 (Sakura)</option>
        <option value="summer" selected>夏 (Green)</option>
        <option value="autumn">秋 (Maple)</option>
        <option value="winter">冬 (Snow)</option>
      </select>
    </div>
    <div class="ctrl-row">
      <label>🌐 API Base URL (Data Layer)</label>
      <input type="text" id="in-api" placeholder="../../contracts/data/arcadia/">
    </div>
    <div class="ctrl-row">
      <label>🗺 World Config URL</label>
      <input type="text" id="in-world" placeholder="./world/world.json">
    </div>
    <div class="ctrl-footer">
      <button class="btn" id="btn-reset">初期化</button>
      <button class="btn active" id="btn-apply">適用 / 閉じる</button>
    </div>
  </div>
  <div id="cvwrap"><canvas id="cv"></canvas></div>
  <div id="tooltip" style="display:none"></div>

  <script>
    window.WORLD_OVERRIDE_URL = './world/world.json';
    // MUD構造への移行に伴い、データ参照先を明示
    window.API = '../../contracts/data/arcadia/';
  </script>
  <script src="../src/map_utils.js"></script>
  <script src="../src/app.js?v=6"></script>
</body>

</html>
