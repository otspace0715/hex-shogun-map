<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏰 アルカディア戦術マップ - サブグリッド</title>
    <link rel="stylesheet" href="../css/map.css">
    <style>
        :root {
            --bg: #0a0818;
            --accent: #a070ff;
            --gold: #f1c40f;
        }
    </style>
</head>

<body>
    <div id="header">
        <a href="index.html" style="text-decoration: none; color: var(--accent); margin-right: 20px;">🏰 大陸地図へ</a>
        <div id="subgrid-title" style="color: var(--accent); font-family: serif;">読み込み中...</div>
        <div style="flex-grow: 1;"></div>
        <button class="btn" id="btn-fit">⊙</button>
        <button class="btn" id="btn-gps">📍 GPS</button>
        <button class="btn" id="btn-ctrl">⚙ 設定</button>
    </div>
    <div id="status">読み込み中...</div>

    <!-- コントロールパネル (Modal) -->
    <div id="overlay-bg"></div>
    <div id="ctrl-panel">
        <h2>⚙ システム・表示設定</h2>
        <div class="ctrl-row">
            <label>📅 シミュレーション年度: <span id="val-year">1580</span>年</label>
            <input type="range" id="range-year" min="1500" max="1615" value="1580">
        </div>
        <div class="ctrl-row">
            <label>🍃 季節</label>
            <select id="sel-season">
                <option value="spring">春 (Sakura)</option>
                <option value="summer" selected>夏 (Green)</option>
                <option value="autumn">秋 (Maple)</option>
                <option value="winter">冬 (Snow)</option>
            </select>
        </div>
        <div class="ctrl-row">
            <label>🌐 API Base URL (Data Layer)</label>
            <input type="text" id="in-api" placeholder="../../contracts/data/arcadia/">
        </div>
        <div class="ctrl-row">
            <label>🗺 World Config URL</label>
            <input type="text" id="in-world" placeholder="./world/world.json">
        </div>
        <div class="ctrl-footer">
            <button class="btn" id="btn-reset">初期化</button>
            <button class="btn active" id="btn-apply">適用 / 閉じる</button>
        </div>
    </div>
    <div id="cvwrap"><canvas id="cv"></canvas></div>
    <div id="tooltip" style="display:none"></div>

    <script>
        window.WORLD_OVERRIDE_URL = './world/world.json';
        // MUD構造への移行に伴い、データ参照先を明示
        window.API = '../../contracts/data/arcadia/';
    </script>
    <script src="../src/map_utils.js"></script>
    <script src="../src/sub_app.js"></script>
</body>

</html>
