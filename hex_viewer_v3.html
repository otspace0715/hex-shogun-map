<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hex-shogun-map ヘックスビューワー v2</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0d1117; color:#e6d5b8;
  font-family:'Georgia',serif; min-height:100vh;
  display:flex; flex-direction:column; align-items:center;
}
header {
  width:100%; padding:12px 16px;
  background:#161b22; border-bottom:1px solid #8b6914;
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:8px;
}
h1 { font-size:1.1rem; color:#d4a843; letter-spacing:.08em; }
.controls {
  display:flex; gap:6px; align-items:center; flex-wrap:wrap;
}
.btn {
  background:#1c2128; border:1px solid #8b6914; color:#d4a843;
  padding:6px 14px; border-radius:4px; cursor:pointer;
  font-size:0.8rem; transition:all .2s;
}
.btn.active { background:#8b6914; color:#0d1117; font-weight:bold; }
.btn:hover { opacity:.8; }
.btn.load { background:#1a3a5c; border-color:#4a90d9; color:#7ab8f5; }
.btn.load.loaded { background:#1a3a2a; border-color:#4a9d6a; color:#7af5aa; }
#wrap {
  width:100%; max-width:960px; padding:16px;
  display:flex; flex-direction:column; gap:12px;
}
canvas {
  background:#1c2128; border:1px solid #2d3748;
  border-radius:8px; max-width:100%; cursor:grab;
}
canvas:active { cursor:grabbing; }
.legend {
  display:flex; gap:12px; flex-wrap:wrap;
  justify-content:center; font-size:0.78rem;
}
.li { display:flex; align-items:center; gap:5px; }
.lc {
  width:14px; height:14px; border-radius:2px;
  border:1px solid #444;
}
.info {
  font-size:0.78rem; color:#8b7355; text-align:center;
}
#status {
  font-size:0.8rem; color:#7ab8f5;
  background:#1c2128; border:1px solid #2d3748;
  padding:6px 12px; border-radius:4px; text-align:center;
}
#tooltip {
  position:fixed; background:#161b22; border:1px solid #8b6914;
  color:#e6d5b8; padding:8px 12px; border-radius:5px;
  font-size:0.78rem; pointer-events:none; display:none;
  line-height:1.7; z-index:100; max-width:220px;
}
</style>
</head>
<body>

<header>
  <h1>⬡ hex-shogun-map ビューワー v3</h1>
  <div class="controls">
    <span style="font-size:.75rem;color:#8b7355">形式：</span>
    <button class="btn" id="btn-pointy" onclick="setMode('pointy')">▲ Pointy</button>
    <button class="btn active" id="btn-flat" onclick="setMode('flat')">⬡ Flat</button>
    <span style="font-size:.75rem;color:#8b7355;margin-left:8px">国：</span>
    <button class="btn load" id="btn-izu" onclick="loadProvince('伊豆')">伊豆</button>
    <button class="btn load" id="btn-sag" onclick="loadProvince('相模')">相模</button>
    <button class="btn load" id="btn-mus" onclick="loadProvince('武蔵')">武蔵</button>
    <button class="btn load" id="btn-sur" onclick="loadProvince('駿河')">駿河</button>
    <button class="btn" onclick="resetView()">⊙ リセット</button>
  </div>
</header>

<div id="wrap">
  <div id="status">国を選択してください</div>
  <canvas id="cv" width="928" height="580"></canvas>
  <div class="legend">
    <div class="li"><div class="lc" style="background:#4a7c59"></div>平地</div>
    <div class="li"><div class="lc" style="background:#6b5a3e"></div>丘陵</div>
    <div class="li"><div class="lc" style="background:#4a4a5a"></div>山岳(通行不可)</div>
    <div class="li"><div class="lc" style="background:#2a5a8a"></div>河川</div>
    <div class="li"><div class="lc" style="background:#1a3a6a"></div>海岸</div>
    <div class="li"><div class="lc" style="background:rgba(255,220,0,.25);border-color:#d4a843"></div>選択中</div>
  </div>
  <div class="info">
    ドラッグ：パン　ピンチ/ホイール：ズーム　タップ：地形情報
  </div>
</div>

<div id="tooltip"></div>

<script>
'use strict';

// ===== API =====
const API = 'https://universal-province-engine-22622080322.asia-northeast1.run.app';

// ===== 状態 =====
let mode = 'flat'; // 'flat' | 'pointy'
let provinces = {}; // { name: [{hex_id,lat,lng,attr}, ...] }
let vp = { ox:0, oy:0, scale:1 };
let selectedHex = null;
let hexCache = []; // [{hex, cx, cy, corners}]

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const tooltip = document.getElementById('tooltip');
const statusEl = document.getElementById('status');

// ===== カラー =====
const COLORS = {
  0: '#4a7c59',   // 平地
  1: '#6b5a3e',   // 丘陵
  2: '#4a4a5a',   // 山岳
  3: '#2a5a8a',   // 河川
  4: '#1a3a6a',   // 海岸
};
const NAMES = {0:'平地', 1:'丘陵', 2:'山岳', 3:'河川', 4:'海岸'};
const PROV_COLORS = {
  '伊豆':'#4a7c59', '相模':'#5a6a4a', '武蔵':'#6a5a4a',
  '駿河':'#4a5a6a', '甲斐':'#6a4a5a',
};

// ===== データ取得 =====
async function loadProvince(name) {
  if (provinces[name]) { draw(); updateStatus(); return; }

  statusEl.textContent = `📡 ${name} を取得中...`;
  const btn = document.getElementById('btn-' + nameToId(name));

  try {
    // まずhex cellsエンドポイントを試す
    let cells = null;
    try {
      const r = await fetch(`${API}/province/${encodeURIComponent(name)}/cells`);
      if (r.ok) { const d = await r.json(); cells = d.cells || d; }
    } catch(e) {}

    // なければ標準エンドポイント（summaryのみ）→ rawデータフォールバック
    if (!cells) {
      const r = await fetch(
        `https://raw.githubusercontent.com/otspace0715/hex-shogun-map/main/sengoku_hex_data_v2/${encodeURIComponent(name)}.json`
      );
      if (r.ok) { const d = await r.json(); cells = d.cells; }
    }

    if (!cells) throw new Error('データ取得失敗');

    provinces[name] = cells;
    if (btn) { btn.classList.add('loaded'); btn.textContent = name + ' ✓'; }
    draw();
    updateStatus();
    resetView();

  } catch(e) {
    statusEl.textContent = `❌ ${name} の取得に失敗: ${e.message}`;
    console.error(e);
  }
}

function nameToId(name) {
  const m = {'伊豆':'izu','相模':'sag','武蔵':'mus','駿河':'sur','甲斐':'kai'};
  return m[name] || name;
}

// ===== 座標計算 =====
// 重要: lat/lngをそのままpx変換し、ヘックスサイズもlat/lng空間で定義
// → 隙間が生じないことを保証する

const LAT_STEP = 0.030311; // 同列の行ピッチ（度）
const LNG_STEP = 0.0525;   // 列間ピッチ（度）

// ヘックスサイズ（lat/lng空間での「半径」）
// Flat-top:
//   列間(水平) = 1.5×r_x → r_x = LNG_STEP / 1.5 ← でも2列おきに配置なので LNG_STEP/3×2=LNG_STEP*2/3?
//   行間(垂直) = √3×r   → r = LAT_STEP / √3
//
// 実際の構造: col1とcol2は互いにオフセット(col2がlat_step分南にずれている)
// lng間隔 = LNG_STEP (= 0.0525度)
// lat間隔 = LAT_STEP (= 0.030311度) ← 同列内
//
// Flat-top正六角形の関係:
//   r_y = LAT_STEP / √3  (垂直半径 = 行ピッチ / √3)
//   r_x = r_y            (正六角形なら r_x = r_y)
//   列間 = 1.5 × r_x (度)で計算すると
//         = 1.5 × LAT_STEP/√3 = 0.026196度 ≠ LNG_STEP(0.0525)
// → 合わない。lng方向にcos補正が必要
//
// 解決: lat/lng→pixel変換でcos補正を入れる
//   px = (lng - lngMin) * scaleX
//   py = (latMax - lat) * scaleY
//   scaleX = scaleY × cos(lat_center) × (lat_km/lng_km_per_deg)
//   これでピクセル空間が等距離になり、Flat-topの関係が成り立つ

// cos補正不要（データがlat/lng等間隔グリッドのため）

function latLngToWorld(lat, lng, bounds, scale) {
  // cos補正なし（データがlat/lng等間隔グリッドで作られているため）
  const x = (lng - bounds.minLng) * scale;
  const y = (bounds.maxLat - lat) * scale;
  return { x, y };
}

function getHexSize(scale) {
  // cos補正なしでlat/lngをそのままpx変換した場合のピッチ
  const latPx = LAT_STEP * scale;  // 行ピッチ(px)
  const lngPx = LNG_STEP * scale;  // 列ピッチ(px) ※cos補正なし

  // lngPx/latPx = √3 になる（データの設計上の比率）
  // 隙間ゼロにするには rx,ry を独立計算する

  if (mode === 'flat') {
    // Flat-top:
    //   列間水平ピッチ = 1.5 × rx → rx = lngPx / 1.5
    //   行間垂直ピッチ = √3 × ry → ry = latPx / √3
    return {
      rx: lngPx / 1.5,
      ry: latPx / Math.sqrt(3)
    };
  } else {
    // Pointy-top:
    //   列間水平ピッチ = √3 × rx → rx = lngPx / √3
    //   行間垂直ピッチ = 1.5 × ry → ry = latPx / 1.5
    return {
      rx: lngPx / Math.sqrt(3),
      ry: latPx / 1.5
    };
  }
}

// 六角形の頂点（rx,ryを独立させて楕円六角形対応）
function hexCorners(cx, cy, rx, ry, mode) {
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const a = mode === 'flat'
      ? (Math.PI / 3) * i
      : (Math.PI / 3) * i + Math.PI / 6;
    pts.push([
      cx + rx * Math.cos(a),
      cy + ry * Math.sin(a)
    ]);
  }
  return pts;
}

// ===== 描画 =====
function draw() {
  const W = cv.width, H = cv.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0a1a0a';
  ctx.fillRect(0, 0, W, H);

  const allCells = getAllCells();
  if (!allCells.length) {
    ctx.fillStyle = 'rgba(212,168,67,.5)';
    ctx.font = '14px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText('国を選択してください', W / 2, H / 2);
    return;
  }

  const bounds = getBounds(allCells);
  const { scale, offX, offY } = calcFit(bounds, W, H);

  hexCache = [];

  ctx.save();
  ctx.translate(vp.ox + offX, vp.oy + offY);
  ctx.scale(vp.scale, vp.scale);

  const { rx, ry } = getHexSize(scale);

  allCells.forEach(({ cell, province }) => {
    const { x, y } = latLngToWorld(cell.lat, cell.lng, bounds, scale);
    const corners = hexCorners(x, y, rx, ry, mode);

    // 塗り
    const baseColor = cell.attr.passable
      ? (COLORS[cell.attr.terrain_type] || '#6b5a3e')
      : '#3a3a4a';

    ctx.beginPath();
    ctx.moveTo(corners[0][0], corners[0][1]);
    for (let i = 1; i < 6; i++) ctx.lineTo(corners[i][0], corners[i][1]);
    ctx.closePath();

    // 国ごとに色合いを微調整（隣接検証用）
    if (Object.keys(provinces).length > 1) {
      const tint = PROV_COLORS[province] || baseColor;
      ctx.fillStyle = blendColors(baseColor, tint, 0.3);
    } else {
      ctx.fillStyle = baseColor;
    }
    ctx.fill();

    // 標高オーバーレイ
    const elevNorm = Math.min(cell.attr.elevation_m / 1200, 1);
    ctx.beginPath();
    ctx.moveTo(corners[0][0], corners[0][1]);
    for (let i = 1; i < 6; i++) ctx.lineTo(corners[i][0], corners[i][1]);
    ctx.closePath();
    ctx.fillStyle = `rgba(255,255,255,${elevNorm * 0.1})`;
    ctx.fill();

    // 選択ハイライト
    if (selectedHex && selectedHex._id === `${province}_${cell.hex_id}`) {
      ctx.beginPath();
      ctx.moveTo(corners[0][0], corners[0][1]);
      for (let i = 1; i < 6; i++) ctx.lineTo(corners[i][0], corners[i][1]);
      ctx.closePath();
      ctx.fillStyle = 'rgba(255,220,0,.3)';
      ctx.fill();
    }

    // 枠線（極細・隙間なし）
    ctx.beginPath();
    ctx.moveTo(corners[0][0], corners[0][1]);
    for (let i = 1; i < 6; i++) ctx.lineTo(corners[i][0], corners[i][1]);
    ctx.closePath();
    ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.lineWidth = 0.5;
    ctx.stroke();

    // アイコン（山岳）
    if (!cell.attr.passable) {
      ctx.font = `${Math.floor(Math.min(rx, ry) * .7)}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(255,255,255,.4)';
      ctx.fillText('⛰', x, y);
    }

    hexCache.push({ cell, province, cx: x, cy: y, rx, ry, corners });
  });

  // 国名ラベル
  if (Object.keys(provinces).length > 1) {
    Object.keys(provinces).forEach(name => {
      const cells = provinces[name];
      const cLat = cells.reduce((s, c) => s + c.lat, 0) / cells.length;
      const cLng = cells.reduce((s, c) => s + c.lng, 0) / cells.length;
      const { x, y } = latLngToWorld(cLat, cLng, bounds, scale);
      ctx.font = `bold ${Math.floor(ry * 0.9)}px Georgia`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(212,168,67,.9)';
      ctx.fillText(name, x, y);
    });
  }

  ctx.restore();
}

function blendColors(c1, c2, t) {
  const p = n => parseInt(n, 16);
  const r1 = p(c1.slice(1,3)), g1 = p(c1.slice(3,5)), b1 = p(c1.slice(5,7));
  const r2 = p(c2.slice(1,3)), g2 = p(c2.slice(3,5)), b2 = p(c2.slice(5,7));
  const r = Math.round(r1 * (1-t) + r2 * t);
  const g = Math.round(g1 * (1-t) + g2 * t);
  const b = Math.round(b1 * (1-t) + b2 * t);
  return `rgb(${r},${g},${b})`;
}

function getAllCells() {
  const result = [];
  Object.keys(provinces).forEach(name => {
    provinces[name].forEach(cell => result.push({ cell, province: name }));
  });
  return result;
}

function getBounds(allCells) {
  const lats = allCells.map(c => c.cell.lat);
  const lngs = allCells.map(c => c.cell.lng);
  return {
    minLat: Math.min(...lats),
    maxLat: Math.max(...lats),
    minLng: Math.min(...lngs),
    maxLng: Math.max(...lngs),
  };
}

function calcFit(bounds, W, H) {
  const pad = 50;
  // セルの実際の表示幅・高さを考慮したスケール計算
  // Flat:   セル幅=2×rx=2×(lngPx/1.5)=lngPx×4/3, セル高=2×ry=2×(latPx/√3)=latPx×2/√3
  // Pointy: セル幅=2×rx=2×(lngPx/√3)=lngPx×2/√3, セル高=2×ry=2×(latPx/1.5)=latPx×4/3
  //
  // 全体の幅 = dLng × scale + セル1個分の余白
  // 全体の高さ = dLat × scale + セル1個分の余白
  const dLng = bounds.maxLng - bounds.minLng;
  const dLat = bounds.maxLat - bounds.minLat;
  
  // 余白込みの範囲
  const marginLng = LNG_STEP * 2;
  const marginLat = LAT_STEP * 2;
  
  const scaleByW = (W - pad * 2) / (dLng + marginLng);
  const scaleByH = (H - pad * 2) / (dLat + marginLat);
  const scale = Math.min(scaleByW, scaleByH);
  return { scale, offX: pad, offY: pad };
}

function resetView() {
  vp = { ox: 0, oy: 0, scale: 1 };
  draw();
}

function updateStatus() {
  const names = Object.keys(provinces);
  const total = names.reduce((s, n) => s + provinces[n].length, 0);
  statusEl.textContent = `✓ ${names.join(' + ')}　合計 ${total} セル　モード: ${mode === 'flat' ? '⬡ Flat-top' : '▲ Pointy-top'}`;
}

// ===== モード切替 =====
function setMode(m) {
  mode = m;
  document.getElementById('btn-flat').classList.toggle('active', m === 'flat');
  document.getElementById('btn-pointy').classList.toggle('active', m === 'pointy');
  draw();
  if (Object.keys(provinces).length) updateStatus();
}

// ===== ヒットテスト =====
function pointInHex(px, py, corners) {
  let inside = false;
  for (let i = 0, j = 5; i < 6; j = i++) {
    const xi = corners[i][0], yi = corners[i][1];
    const xj = corners[j][0], yj = corners[j][1];
    if ((yi > py) !== (yj > py) &&
        px < (xj - xi) * (py - yi) / (yj - yi) + xi) {
      inside = !inside;
    }
  }
  return inside;
}

function getHexAt(clientX, clientY) {
  const rect = cv.getBoundingClientRect();
  const bounds = getBounds(getAllCells());
  const { scale, offX, offY } = calcFit(bounds, cv.width, cv.height);
  const scaleX = cv.width / rect.width;
  const scaleY = cv.height / rect.height;
  const px = ((clientX - rect.left) * scaleX - vp.ox - offX) / vp.scale;
  const py = ((clientY - rect.top) * scaleY - vp.oy - offY) / vp.scale;
  for (const h of hexCache) {
    if (pointInHex(px, py, h.corners)) return h;
  }
  return null;
}

// ===== イベント =====
cv.addEventListener('mousemove', e => {
  const h = getHexAt(e.clientX, e.clientY);
  if (!h) { tooltip.style.display = 'none'; return; }
  showTooltip(h, e.clientX, e.clientY);
});
cv.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
cv.addEventListener('click', e => {
  const h = getHexAt(e.clientX, e.clientY);
  if (!h) return;
  selectedHex = { _id: `${h.province}_${h.cell.hex_id}` };
  draw();
  showTooltip(h, e.clientX, e.clientY);
});

// タッチ
cv.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, ox: vp.ox, oy: vp.oy };
  }
}, { passive: false });

let touchStart = null, lastDist = 0;
cv.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && touchStart) {
    vp.ox = touchStart.ox + (e.touches[0].clientX - touchStart.x);
    vp.oy = touchStart.oy + (e.touches[0].clientY - touchStart.y);
    draw();
  } else if (e.touches.length === 2) {
    const d = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    if (lastDist) {
      vp.scale = Math.max(0.3, Math.min(8, vp.scale * (d / lastDist)));
      draw();
    }
    lastDist = d;
  }
}, { passive: false });
cv.addEventListener('touchend', () => { touchStart = null; lastDist = 0; });

// マウスパン
let md = false, mx = 0, my = 0;
cv.addEventListener('mousedown', e => { md = true; mx = e.clientX; my = e.clientY; });
window.addEventListener('mousemove', e => {
  if (!md) return;
  vp.ox += e.clientX - mx; vp.oy += e.clientY - my;
  mx = e.clientX; my = e.clientY;
  draw();
});
window.addEventListener('mouseup', () => md = false);

// ホイールズーム
cv.addEventListener('wheel', e => {
  e.preventDefault();
  const f = e.deltaY < 0 ? 1.12 : 1/1.12;
  const rect = cv.getBoundingClientRect();
  const lx = e.clientX - rect.left;
  const ly = e.clientY - rect.top;
  vp.ox = lx - (lx - vp.ox) * f;
  vp.oy = ly - (ly - vp.oy) * f;
  vp.scale = Math.max(0.3, Math.min(8, vp.scale * f));
  draw();
}, { passive: false });

// レスポンシブ
window.addEventListener('resize', () => {
  cv.width = Math.min(928, window.innerWidth - 32);
  draw();
});

function showTooltip(h, cx, cy) {
  const a = h.cell.attr;
  tooltip.style.display = 'block';
  tooltip.style.left = (cx + 12) + 'px';
  tooltip.style.top = (cy - 10) + 'px';
  tooltip.innerHTML =
    `<b>${h.province} / ${h.cell.hex_id}</b><br>` +
    `地形：${NAMES[a.terrain_type] || '不明'}<br>` +
    `標高：${a.elevation_m}m<br>` +
    `通行：${a.passable ? '可' : '<span style="color:#f87171">不可（山岳）</span>'}<br>` +
    `移動コスト：${a.cost}<br>` +
    `<span style="font-size:.7rem;color:#8b7355">${h.cell.lat.toFixed(5)}, ${h.cell.lng.toFixed(5)}</span>`;
}

// ===== 初期読み込み =====
cv.width = Math.min(928, window.innerWidth - 32);
loadProvince('伊豆');
</script>
</body>
</html>
