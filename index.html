<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>⬡ Hex World Map</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #060c1e;
      color: #c8d8e8;
      font-family: monospace;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 20px;
    }

    h1 {
      color: #5aacdf;
      font-size: 22px;
      letter-spacing: 0.1em;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
    }

    .card {
      display: block;
      width: 160px;
      padding: 24px 16px;
      border-radius: 12px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .card:active {
      transform: scale(0.96);
    }

    .card .icon {
      font-size: 44px;
      margin-bottom: 12px;
    }

    .card .name {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .card .desc {
      font-size: 11px;
      line-height: 1.6;
      opacity: 0.7;
    }

    .card.sengoku {
      background: rgba(10, 30, 15, 0.85);
      border: 1px solid rgba(60, 140, 70, 0.6);
      color: #a8e0b0;
    }

    .card.sengoku:hover {
      border-color: rgba(80, 200, 100, 0.9);
      box-shadow: 0 0 20px rgba(60, 200, 80, 0.2);
    }

    .card.arcadia {
      background: rgba(20, 10, 40, 0.85);
      border: 1px solid rgba(120, 60, 200, 0.6);
      color: #c0a0ff;
    }

    .card.arcadia:hover {
      border-color: rgba(160, 100, 255, 0.9);
      box-shadow: 0 0 20px rgba(120, 60, 255, 0.2);
    }

    footer {
      font-size: 10px;
      color: #304060;
      text-align: center;
    }
  </style>
</head>

<body>
  <h1>⬡ Hex World Map</h1>

  <div class="cards">
    <a class="card sengoku" href="packages/client/sengoku/index.html">
      <div class="icon">⛩️</div>
      <div class="name">戦国時代オンライン</div>
      <div class="desc">室町・戦国時代<br>日本69令制国<br>史実マップ</div>
    </a>

    <a class="card arcadia" href="packages/client/arcadia/index.html">
      <div class="icon">🏰</div>
      <div class="name">アルカディア大陸</div>
      <div class="desc">魔法と剣の異世界<br>6王国の覇権争い<br>ファンタジー</div>
    </a>
  </div>

  <footer>⬡ Hex World Map — Universal Province Engine</footer>
</body>

</html>
