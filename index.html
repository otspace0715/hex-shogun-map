<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>⬡ Hex World Map</title>
  <link rel="stylesheet" href="css/map.css">
  <style>
    /* ── ワールド選択画面 ── */
    #world-select {
      position: fixed; inset: 0;
      background: #060c1e;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px; z-index: 1000;
      transition: opacity 0.4s;
    }
    #world-select.hidden { opacity: 0; pointer-events: none; }

    #world-select h1 {
      color: #5aacdf; font-size: 20px;
      font-family: monospace; letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .world-cards {
      display: flex; flex-wrap: wrap;
      gap: 16px; justify-content: center;
      padding: 0 20px;
    }

    .world-card {
      width: 160px; padding: 20px 16px;
      background: rgba(10,20,50,0.8);
      border: 1px solid rgba(40,80,160,0.5);
      border-radius: 12px; cursor: pointer;
      text-align: center; transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .world-card:active { transform: scale(0.96); }
    .world-card:hover  { border-color: rgba(80,160,255,0.8); background: rgba(20,40,100,0.9); }

    .world-card .icon  { font-size: 40px; margin-bottom: 10px; }
    .world-card .name  { font-size: 14px; font-weight: bold; color: #c0d8f0; font-family: monospace; }
    .world-card .desc  { font-size: 11px; color: #607090; margin-top: 6px; line-height: 1.5; }

    .world-card.sengoku { border-color: rgba(60,140,70,0.5); }
    .world-card.sengoku:hover { border-color: rgba(80,200,100,0.8); background: rgba(10,40,20,0.9); }
    .world-card.arcadia { border-color: rgba(120,60,200,0.5); }
    .world-card.arcadia:hover { border-color: rgba(160,100,255,0.8); background: rgba(20,10,40,0.9); }

    /* ── マップ画面 ── */
    #map-view { display: none; flex-direction: column; height: 100dvh; }
    #map-view.active { display: flex; }

    #back-btn {
      position: absolute; top: 4px; right: 4px;
      background: rgba(10,20,50,0.8);
      border: 1px solid rgba(40,80,160,0.5);
      color: #a8c8e8; font-size: 11px;
      padding: 3px 8px; border-radius: 4px;
      cursor: pointer; z-index: 10;
    }
  </style>
</head>
<body>

  <!-- ── ワールド選択画面 ── -->
  <div id="world-select">
    <h1>⬡ Hex World Map</h1>
    <div class="world-cards">

      <div class="world-card sengoku" onclick="enterWorld('sengoku')">
        <div class="icon">⛩️</div>
        <div class="name">戦国時代オンライン</div>
        <div class="desc">室町・戦国時代<br>日本68令制国<br>史実マップ</div>
      </div>

      <div class="world-card arcadia" onclick="enterWorld('arcadia')">
        <div class="icon">🏰</div>
        <div class="name">アルカディア大陸</div>
        <div class="desc">魔法と剣の異世界<br>6王国の覇権争い<br>ファンタジー</div>
      </div>

    </div>
  </div>

  <!-- ── マップ画面 ── -->
  <div id="map-view">
    <div id="header">
      <span id="ver">⬡ hex-shogun-map</span>
      <!-- 省ボタンはinitFromHTML()で生成 -->
      <button class="btn active" id="m-pt">▲ Pointy</button>
      <button class="btn"        id="m-fl">○ Flat</button>
      <!-- data-prov ボタンは enterWorld() で動的生成 -->
      <button class="btn" id="btn-fit">⊙</button>
      <button class="btn" id="btn-gps">📍 GPS</button>
      <button class="btn" id="btn-spawn">🏠 スポーン地点</button>
      <button id="back-btn" onclick="backToSelect()">← 戻る</button>
    </div>
    <div id="status">国を選んでください</div>
    <div id="cvwrap"><canvas id="cv"></canvas></div>
    <div id="tooltip" style="display:none"></div>
  </div>

  <script>
    // ── ワールド定義 ──
    const WORLDS = {
      sengoku: {
        worldUrl: 'https://raw.githubusercontent.com/otspace0715/hex-shogun-map/main/sengoku/world/world.json',
        theme: {
          '--bg':      '#060c1e',
          '--header-bg':'rgba(6,12,30,0.95)',
          '--border':  'rgba(40,80,140,0.4)',
          '--accent':  '#4a9adf',
          '--status-color': '#5aacdf',
          '--btn-bg':  'rgba(10,20,50,0.8)',
          '--btn-border': 'rgba(40,80,160,0.5)',
          '--btn-color': '#a8c8e8',
          '--btn-active-bg': 'rgba(20,60,140,0.9)',
          '--btn-active-border': 'rgba(80,140,220,0.8)',
        },
        // 初期ボタン（world.jsonロード前のフォールバック）
        provinces: [
          {prov:'伊豆',   id:'izu', color:'60,140,70',  autoload:true},
          {prov:'相模',   id:'sag', color:'80,100,160'},
          {prov:'駿河',   id:'sur', color:'160,100,60'},
          {prov:'武蔵',   id:'mus', color:'160,80,60'},
          {prov:'甲斐',   id:'kai', color:'140,80,160'},
          {prov:'安房',   id:'awa', color:'80,160,120'},
          {prov:'上総',   id:'kaz', color:'160,140,60'},
          {prov:'蝦夷',   id:'ezo', color:'80,130,160'},
        ],
        gps: true
      },
      arcadia: {
        worldUrl: 'https://raw.githubusercontent.com/otspace0715/hex-shogun-map/main/arcadia/world/world_arcadia.json',
        theme: {
          '--bg':      '#0a0818',
          '--header-bg':'rgba(10,8,24,0.95)',
          '--border':  'rgba(100,60,180,0.4)',
          '--accent':  '#a070ff',
          '--status-color': '#9060df',
          '--btn-bg':  'rgba(20,10,50,0.8)',
          '--btn-border': 'rgba(100,60,200,0.5)',
          '--btn-color': '#c0a0ff',
          '--btn-active-bg': 'rgba(60,20,140,0.9)',
          '--btn-active-border': 'rgba(150,100,255,0.8)',
        },
        provinces: [
          {prov:'黄金王国アウロス',   id:'aur', color:'200,160,40',  autoload:true},
          {prov:'銀月王国シルヴァ',   id:'sil', color:'150,180,200'},
          {prov:'炎帝国イグニス',     id:'ign', color:'200,80,40'},
          {prov:'翠森共和国ヴェルデ', id:'ver', color:'60,160,80'},
          {prov:'深海神聖マレア',     id:'mar', color:'40,100,180'},
          {prov:'暗黒領主ウンブラ',   id:'umb', color:'80,40,120'},
        ],
        gps: false
      }
    };

    let currentWorld = null;

    function applyTheme(theme) {
      Object.entries(theme).forEach(([k,v]) => document.documentElement.style.setProperty(k, v));
      document.body.style.background      = theme['--bg'];
      document.getElementById('status').style.color = theme['--status-color'];
    }

    function buildButtons(provinces, gps) {
      const header  = document.getElementById('header');
      const btnFit  = document.getElementById('btn-fit');
      const btnGPS  = document.getElementById('btn-gps');
      const btnSpawn= document.getElementById('btn-spawn');

      // 既存の省ボタンを削除
      header.querySelectorAll('.prov-btn').forEach(b => b.remove());

      // 省ボタンを生成
      provinces.forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'btn prov-btn';
        btn.dataset.prov  = p.prov;
        btn.dataset.id    = p.id;
        btn.dataset.color = p.color;
        if (p.autoload) btn.dataset.autoload = 'true';
        btn.textContent = p.prov;
        header.insertBefore(btn, btnFit);
      });

      // GPS表示制御
      btnGPS.style.display   = gps ? '' : 'none';
      btnSpawn.style.display = gps ? '' : 'none';
    }

    function enterWorld(worldId) {
      const world = WORLDS[worldId];
      if (!world) return;
      currentWorld = worldId;

      // テーマ適用
      applyTheme(world.theme);

      // 画面切り替え
      document.getElementById('world-select').classList.add('hidden');
      const mapView = document.getElementById('map-view');
      mapView.classList.add('active');

      // ボタン生成
      buildButtons(world.provinces, world.gps);

      // app.jsにworld URLを伝えてリセット
      window.WORLD_OVERRIDE_URL = world.worldUrl;

      // app.jsの再初期化
      if (typeof resetWorld === 'function') {
        resetWorld();
      }
    }

    function backToSelect() {
      document.getElementById('world-select').classList.remove('hidden');
      document.getElementById('map-view').classList.remove('active');
      // 状態リセット
      if (typeof resetWorld === 'function') resetWorld();
    }
  </script>

  <!-- app.jsはマップ画面のDOM生成後にロード -->
  <script src="js/app.js"></script>
</body>
</html>
