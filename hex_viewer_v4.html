<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hex-shogun-map ビューワー v4</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0d1117; color:#e6d5b8;
  font-family:'Georgia',serif; min-height:100vh;
  display:flex; flex-direction:column; align-items:center;
}
header {
  width:100%; padding:12px 16px;
  background:#161b22; border-bottom:1px solid #8b6914;
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:8px;
}
h1 { font-size:1.1rem; color:#d4a843; letter-spacing:.08em; }
.controls { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.btn {
  background:#1c2128; border:1px solid #8b6914; color:#d4a843;
  padding:6px 14px; border-radius:4px; cursor:pointer; font-size:0.8rem; transition:all .2s;
}
.btn.active { background:#8b6914; color:#0d1117; font-weight:bold; }
.btn:hover { opacity:.8; }
.btn.load { background:#1a3a5c; border-color:#4a90d9; color:#7ab8f5; }
.btn.load.loaded { background:#1a3a2a; border-color:#4a9d6a; color:#7af5aa; }
#wrap { width:100%; max-width:960px; padding:16px; display:flex; flex-direction:column; gap:12px; }
canvas {
  background:#0a1a0a; border:1px solid #2d3748;
  border-radius:8px; max-width:100%; cursor:grab; display:block;
}
canvas:active { cursor:grabbing; }
.legend { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; font-size:0.78rem; }
.li { display:flex; align-items:center; gap:5px; }
.lc { width:14px; height:14px; border-radius:2px; border:1px solid #444; }
.info { font-size:0.78rem; color:#8b7355; text-align:center; }
#status {
  font-size:0.8rem; color:#7ab8f5;
  background:#1c2128; border:1px solid #2d3748;
  padding:6px 12px; border-radius:4px; text-align:center;
}
#tooltip {
  position:fixed; background:#161b22; border:1px solid #8b6914;
  color:#e6d5b8; padding:8px 12px; border-radius:5px;
  font-size:0.78rem; pointer-events:none; display:none;
  line-height:1.7; z-index:100; max-width:220px;
}
</style>
</head>
<body>
<header>
  <h1>⬡ hex-shogun-map ビューワー v4</h1>
  <div class="controls">
    <span style="font-size:.75rem;color:#8b7355">形式：</span>
    <button class="btn active" id="btn-pointy" onclick="setMode('pointy')">▲ Pointy</button>
    <button class="btn" id="btn-flat" onclick="setMode('flat')">⬡ Flat</button>
    <span style="font-size:.75rem;color:#8b7355;margin-left:8px">国：</span>
    <button class="btn load" id="btn-izu" onclick="loadProvince('伊豆')">伊豆</button>
    <button class="btn load" id="btn-sag" onclick="loadProvince('相模')">相模</button>
    <button class="btn load" id="btn-mus" onclick="loadProvince('武蔵')">武蔵</button>
    <button class="btn load" id="btn-sur" onclick="loadProvince('駿河')">駿河</button>
    <button class="btn load" id="btn-kai" onclick="loadProvince('甲斐')">甲斐</button>
    <button class="btn" onclick="resetView()">⊙ リセット</button>
  </div>
</header>

<div id="wrap">
  <div id="status">国を選択してください</div>
  <canvas id="cv"></canvas>
  <div class="legend">
    <div class="li"><div class="lc" style="background:#4a7c59"></div>平地</div>
    <div class="li"><div class="lc" style="background:#6b5a3e"></div>丘陵</div>
    <div class="li"><div class="lc" style="background:#4a4a5a"></div>山岳(不可)</div>
    <div class="li"><div class="lc" style="background:#2a5a8a"></div>河川</div>
    <div class="li"><div class="lc" style="background:#1a3a6a"></div>海岸</div>
  </div>
  <div class="info">ドラッグ：パン　ピンチ/ホイール：ズーム　タップ：地形情報</div>
</div>
<div id="tooltip"></div>

<script>
'use strict';

// ===== 定数 =====
const API = 'https://universal-province-engine-22622080322.asia-northeast1.run.app';
const LAT_STEP = 0.030311;
const LNG_STEP = 0.0525;

// ===== 核心：スケール比率 =====
// scaleX = scaleY × (LAT_STEP/LNG_STEP) = scaleY × (1/√3)
// これにより：
//   Pointy-top: 正六角形、辺と辺が完全に接する、地図正確
//   Flat-top:   同様
const SCALE_RATIO = LAT_STEP / LNG_STEP; // = 1/√3 ≈ 0.5774

// ===== 状態 =====
let mode = 'pointy';
let provinces = {};
let vp = { ox:0, oy:0, scale:1 };
let selectedHex = null;
let hexCache = [];

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const tooltip = document.getElementById('tooltip');
const statusEl = document.getElementById('status');

// ===== カラー =====
const COLORS = { 0:'#4a7c59', 1:'#6b5a3e', 2:'#4a4a5a', 3:'#2a5a8a', 4:'#1a3a6a' };
const NAMES = { 0:'平地', 1:'丘陵', 2:'山岳', 3:'河川', 4:'海岸' };
const PROV_HUE = { '伊豆':115, '相模':150, '武蔵':40, '駿河':200, '甲斐':280 };

// ===== データ取得 =====
async function loadProvince(name) {
  if (provinces[name]) { fitAndDraw(); updateStatus(); return; }
  statusEl.textContent = `📡 ${name} を取得中...`;
  const btn = document.getElementById('btn-' + nameToId(name));
  try {
    const r = await fetch(
      `https://raw.githubusercontent.com/otspace0715/hex-shogun-map/main/sengoku_hex_data_v2/${encodeURIComponent(name)}.json`
    );
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    provinces[name] = d.cells;
    if (btn) { btn.classList.add('loaded'); btn.textContent = name + ' ✓'; }
    fitAndDraw();
    updateStatus();
  } catch(e) {
    statusEl.textContent = `❌ ${name} 取得失敗: ${e.message}`;
  }
}

function nameToId(n) {
  return {'伊豆':'izu','相模':'sag','武蔵':'mus','駿河':'sur','甲斐':'kai'}[n] || n;
}

// ===== 座標変換（核心） =====
// scaleY: 緯度1度あたりのピクセル数
// scaleX: 経度1度あたりのピクセル数 = scaleY × SCALE_RATIO
// → 正六角形グリッド・隙間ゼロが保証される

function latLngToXY(lat, lng, bounds, scaleY) {
  const scaleX = scaleY * SCALE_RATIO;
  return {
    x: (lng - bounds.minLng) * scaleX,
    y: (bounds.maxLat - lat) * scaleY
  };
}

// ヘックスサイズ r（正六角形）
function calcR(scaleY) {
  // Pointy-top: 同列行ピッチ = √3×r → r = LAT_STEP×scaleY / √3
  // Flat-top:   同列行ピッチ = √3×r → 同じ
  return LAT_STEP * scaleY / Math.sqrt(3);
}

// ===== 描画 =====
function fitAndDraw() {
  const all = getAllCells();
  if (!all.length) return;
  const bounds = getBounds(all);
  const W = cv.width, H = cv.height;
  const pad = 50;
  const dLat = bounds.maxLat - bounds.minLat + LAT_STEP * 2;
  const dLng = (bounds.maxLng - bounds.minLng + LNG_STEP * 2) * SCALE_RATIO;
  const scaleY = Math.min((W - pad*2) / dLng, (H - pad*2) / dLat);
  vp = { ox: pad, oy: pad, scale: 1, scaleY };
  draw();
}

function draw() {
  const W = cv.width, H = cv.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#0a1a0a';
  ctx.fillRect(0,0,W,H);

  const all = getAllCells();
  if (!all.length) {
    ctx.fillStyle = 'rgba(212,168,67,.5)'; ctx.font='14px Georgia';
    ctx.textAlign='center'; ctx.fillText('国を選択してください', W/2, H/2);
    return;
  }

  const bounds = getBounds(all);
  const scaleY = vp.scaleY || 1000;
  const r = calcR(scaleY);

  hexCache = [];
  ctx.save();
  ctx.translate(vp.ox, vp.oy);
  ctx.scale(vp.scale, vp.scale);

  all.forEach(({ cell, province }) => {
    const { x, y } = latLngToXY(cell.lat, cell.lng, bounds, scaleY);
    const corners = hexCorners(x, y, r);
    const color = cell.attr.passable
      ? (COLORS[cell.attr.terrain_type] || '#6b5a3e')
      : '#3a3a4a';

    // 国ごとの色合い
    const finalColor = Object.keys(provinces).length > 1
      ? tintColor(color, PROV_HUE[province] || 120, 0.25)
      : color;

    // 塗り
    ctx.beginPath();
    corners.forEach((p,i) => i===0 ? ctx.moveTo(p[0],p[1]) : ctx.lineTo(p[0],p[1]));
    ctx.closePath();
    ctx.fillStyle = finalColor;
    ctx.fill();

    // 標高による明度変化
    const elevNorm = Math.min(cell.attr.elevation_m / 1200, 1);
    ctx.beginPath();
    corners.forEach((p,i) => i===0 ? ctx.moveTo(p[0],p[1]) : ctx.lineTo(p[0],p[1]));
    ctx.closePath();
    ctx.fillStyle = `rgba(255,255,255,${elevNorm * 0.1})`;
    ctx.fill();

    // 選択ハイライト
    if (selectedHex && selectedHex === `${province}:${cell.hex_id}`) {
      ctx.beginPath();
      corners.forEach((p,i) => i===0 ? ctx.moveTo(p[0],p[1]) : ctx.lineTo(p[0],p[1]));
      ctx.closePath();
      ctx.fillStyle = 'rgba(255,220,0,.35)';
      ctx.fill();
    }

    // 枠線（隙間なし・極細）
    ctx.beginPath();
    corners.forEach((p,i) => i===0 ? ctx.moveTo(p[0],p[1]) : ctx.lineTo(p[0],p[1]));
    ctx.closePath();
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 0.8 / vp.scale;
    ctx.stroke();

    // 山岳アイコン
    if (!cell.attr.passable) {
      ctx.font = `${Math.floor(r * .65)}px serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(255,255,255,.35)';
      ctx.fillText('⛰', x, y);
    }

    hexCache.push({ cell, province, cx:x, cy:y, r, corners });
  });

  // 国名ラベル
  if (Object.keys(provinces).length > 1) {
    Object.keys(provinces).forEach(name => {
      const cells = provinces[name];
      const cLat = cells.reduce((s,c)=>s+c.lat,0)/cells.length;
      const cLng = cells.reduce((s,c)=>s+c.lng,0)/cells.length;
      const { x, y } = latLngToXY(cLat, cLng, getBounds(all), scaleY);
      ctx.font = `bold ${Math.floor(r*0.85)}px Georgia`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(212,168,67,.95)';
      ctx.strokeStyle = 'rgba(0,0,0,.6)';
      ctx.lineWidth = 2;
      ctx.strokeText(name, x, y);
      ctx.fillText(name, x, y);
    });
  }

  ctx.restore();
}

// ===== ヘックス頂点計算（正六角形・rx=ry=r） =====
function hexCorners(cx, cy, r) {
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const a = mode === 'flat'
      ? (Math.PI / 3) * i
      : (Math.PI / 3) * i + Math.PI / 6;
    pts.push([cx + r * Math.cos(a), cy + r * Math.sin(a)]);
  }
  return pts;
}

// ===== カラーユーティリティ =====
function tintColor(hex, hue, strength) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const tr = Math.round(128 + 127*Math.cos((hue)*Math.PI/180));
  const tg = Math.round(128 + 127*Math.cos((hue-120)*Math.PI/180));
  const tb = Math.round(128 + 127*Math.cos((hue-240)*Math.PI/180));
  return `rgb(${Math.round(r*(1-strength)+tr*strength)},${Math.round(g*(1-strength)+tg*strength)},${Math.round(b*(1-strength)+tb*strength)})`;
}

// ===== ユーティリティ =====
function getAllCells() {
  const res = [];
  Object.keys(provinces).forEach(n => provinces[n].forEach(c => res.push({cell:c, province:n})));
  return res;
}
function getBounds(all) {
  const lats = all.map(c=>c.cell.lat), lngs = all.map(c=>c.cell.lng);
  return { minLat:Math.min(...lats), maxLat:Math.max(...lats), minLng:Math.min(...lngs), maxLng:Math.max(...lngs) };
}
function resetView() { fitAndDraw(); }
function updateStatus() {
  const names = Object.keys(provinces);
  const total = names.reduce((s,n)=>s+provinces[n].length,0);
  statusEl.textContent = `✓ ${names.join(' + ')}　合計 ${total} セル　${mode==='pointy'?'▲ Pointy-top':'⬡ Flat-top'}`;
}
function setMode(m) {
  mode = m;
  document.getElementById('btn-pointy').classList.toggle('active', m==='pointy');
  document.getElementById('btn-flat').classList.toggle('active', m==='flat');
  if (Object.keys(provinces).length) { fitAndDraw(); updateStatus(); }
}

// ===== ヒットテスト =====
function pointInHex(px, py, corners) {
  let inside = false;
  for (let i=0,j=5; i<6; j=i++) {
    const [xi,yi]=corners[i], [xj,yj]=corners[j];
    if ((yi>py)!==(yj>py) && px<(xj-xi)*(py-yi)/(yj-yi)+xi) inside=!inside;
  }
  return inside;
}

function getHexAt(clientX, clientY) {
  const rect = cv.getBoundingClientRect();
  const scX = cv.width/rect.width, scY = cv.height/rect.height;
  const px = ((clientX-rect.left)*scX - vp.ox) / vp.scale;
  const py = ((clientY-rect.top)*scY - vp.oy) / vp.scale;
  for (const h of hexCache) {
    if (pointInHex(px, py, h.corners)) return h;
  }
  return null;
}

function showTooltip(h, cx, cy) {
  const a = h.cell.attr;
  tooltip.style.display = 'block';
  tooltip.style.left = (cx+12)+'px';
  tooltip.style.top = (cy-10)+'px';
  tooltip.innerHTML =
    `<b>${h.province} / ${h.cell.hex_id}</b><br>` +
    `地形：${NAMES[a.terrain_type]||'不明'}<br>` +
    `標高：${a.elevation_m}m<br>` +
    `通行：${a.passable?'可':'<span style="color:#f87171">不可</span>'}<br>` +
    `<span style="font-size:.7rem;color:#8b7355">${h.cell.lat.toFixed(5)}, ${h.cell.lng.toFixed(5)}</span>`;
}

// ===== イベント =====
cv.addEventListener('mousemove', e => {
  const h = getHexAt(e.clientX, e.clientY);
  if (!h) { tooltip.style.display='none'; return; }
  showTooltip(h, e.clientX, e.clientY);
});
cv.addEventListener('mouseleave', () => tooltip.style.display='none');
cv.addEventListener('click', e => {
  const h = getHexAt(e.clientX, e.clientY);
  if (!h) return;
  selectedHex = `${h.province}:${h.cell.hex_id}`;
  draw(); showTooltip(h, e.clientX, e.clientY);
});

// マウスパン
let md=false, mx=0, my=0;
cv.addEventListener('mousedown', e=>{md=true;mx=e.clientX;my=e.clientY;});
window.addEventListener('mousemove', e=>{
  if(!md)return;
  vp.ox+=e.clientX-mx; vp.oy+=e.clientY-my; mx=e.clientX; my=e.clientY; draw();
});
window.addEventListener('mouseup', ()=>md=false);

// ホイールズーム
cv.addEventListener('wheel', e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.12:1/1.12;
  const rect=cv.getBoundingClientRect();
  const lx=e.clientX-rect.left, ly=e.clientY-rect.top;
  vp.ox=lx-(lx-vp.ox)*f; vp.oy=ly-(ly-vp.oy)*f;
  vp.scale=Math.max(0.3,Math.min(10,vp.scale*f));
  vp.scaleY=(vp.scaleY||1000)*f;
  draw();
},{passive:false});

// タッチ
let ts=null, ld=0;
cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===1) ts={x:e.touches[0].clientX,y:e.touches[0].clientY,ox:vp.ox,oy:vp.oy};
},{passive:false});
cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&ts){
    vp.ox=ts.ox+(e.touches[0].clientX-ts.x);
    vp.oy=ts.oy+(e.touches[0].clientY-ts.y);
    draw();
  } else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(ld){
      const f=d/ld;
      vp.scale=Math.max(0.3,Math.min(10,vp.scale*f));
      vp.scaleY=(vp.scaleY||1000)*f;
      draw();
    }
    ld=d;
  }
},{passive:false});
cv.addEventListener('touchend',()=>{ts=null;ld=0;});

// リサイズ
window.addEventListener('resize',()=>{
  cv.width=Math.min(928,window.innerWidth-32);
  cv.height=Math.round(cv.width*0.65);
  if(Object.keys(provinces).length) fitAndDraw();
});

// ===== 初期化 =====
cv.width = Math.min(928, window.innerWidth-32);
cv.height = Math.round(cv.width * 0.65);
loadProvince('伊豆');
</script>
</body>
</html>
