<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>六角形辺の位置検証</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d1117; color:#e6d5b8; font-family:monospace; display:flex; flex-direction:column; align-items:center; }
header { width:100%; padding:10px 14px; background:#161b22; border-bottom:1px solid #8b6914; display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
h1 { font-size:.95rem; color:#d4a843; }
.btn { background:#1c2128; border:1px solid #4a5568; color:#aab; padding:5px 12px; border-radius:3px; cursor:pointer; font-size:.78rem; }
.btn.active { background:#8b6914; border-color:#d4a843; color:#000; font-weight:bold; }
#info { font-size:.72rem; color:#7ab8f5; background:#1c2128; border:1px solid #2d3748; padding:5px 10px; border-radius:3px; text-align:center; width:100%; max-width:900px; margin:8px 0 0; }
canvas { background:#0a1a0a; border:1px solid #2d3748; border-radius:6px; max-width:100%; cursor:crosshair; display:block; touch-action:none; }
#tip { position:fixed; background:rgba(10,20,10,.97); border:1px solid #d4a843; color:#e6d5b8; padding:6px 10px; border-radius:4px; font-size:.72rem; pointer-events:none; display:none; line-height:1.8; z-index:200; }
#wrap { width:100%; max-width:900px; padding:10px; display:flex; flex-direction:column; gap:8px; }
</style>
</head>
<body>
<header>
  <h1>⬡ 六角形辺位置検証ビューワー</h1>
  <button class="btn active" id="m-pt" onclick="setMode('pointy')">▲ Pointy-top</button>
  <button class="btn" id="m-fl" onclick="setMode('flat')">⬡ Flat-top</button>
  <button class="btn" onclick="toggleDebug()">🔲 辺中点表示</button>
  <button class="btn" onclick="toggleGrid()">📐 セル中心線</button>
</header>
<div id="wrap">
  <div id="info">セルをタップ→辺が点滅ハイライト。隣接セルとの辺共有を確認できます。</div>
  <canvas id="cv"></canvas>
</div>
<div id="tip"></div>

<script>
'use strict';

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 伊豆データ（実座標）
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const CELLS = [
  {hex_id:"1_1",lat:34.69149,lng:138.79127,attr:{elevation_m:446,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"1_2",lat:34.752111,lng:138.79127,attr:{elevation_m:231,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"1_3",lat:34.812733,lng:138.79127,attr:{elevation_m:659,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"1_4",lat:34.873355,lng:138.79127,attr:{elevation_m:761,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"1_5",lat:34.933977,lng:138.79127,attr:{elevation_m:517,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"1_6",lat:34.994598,lng:138.79127,attr:{elevation_m:390,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"2_1",lat:34.661179,lng:138.84377,attr:{elevation_m:101,terrain_type:0,passable:true,cost:1.0}},
  {hex_id:"2_2",lat:34.7218,lng:138.84377,attr:{elevation_m:244,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"2_3",lat:34.782422,lng:138.84377,attr:{elevation_m:396,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"2_4",lat:34.843044,lng:138.84377,attr:{elevation_m:559,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"2_5",lat:34.903666,lng:138.84377,attr:{elevation_m:764,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"2_6",lat:34.964288,lng:138.84377,attr:{elevation_m:485,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"3_1",lat:34.69149,lng:138.89627,attr:{elevation_m:313,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"3_2",lat:34.752111,lng:138.89627,attr:{elevation_m:487,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"3_3",lat:34.812733,lng:138.89627,attr:{elevation_m:577,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"3_4",lat:34.873355,lng:138.89627,attr:{elevation_m:957,terrain_type:2,passable:false,cost:9.9}},
  {hex_id:"3_5",lat:34.933977,lng:138.89627,attr:{elevation_m:684,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"3_6",lat:34.994598,lng:138.89627,attr:{elevation_m:616,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"4_2",lat:34.7218,lng:138.94877,attr:{elevation_m:310,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"4_3",lat:34.782422,lng:138.94877,attr:{elevation_m:840,terrain_type:2,passable:false,cost:9.9}},
  {hex_id:"4_4",lat:34.843044,lng:138.94877,attr:{elevation_m:929,terrain_type:2,passable:false,cost:9.9}},
  {hex_id:"4_5",lat:34.903666,lng:138.94877,attr:{elevation_m:1112,terrain_type:2,passable:false,cost:9.9}},
  {hex_id:"4_6",lat:34.964288,lng:138.94877,attr:{elevation_m:831,terrain_type:2,passable:false,cost:9.9}},
  {hex_id:"4_7",lat:35.024909,lng:138.94877,attr:{elevation_m:751,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"4_8",lat:35.085531,lng:138.94877,attr:{elevation_m:498,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"4_9",lat:35.146153,lng:138.94877,attr:{elevation_m:145,terrain_type:0,passable:true,cost:1.0}},
  {hex_id:"5_2",lat:34.752111,lng:139.00127,attr:{elevation_m:614,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"5_3",lat:34.812733,lng:139.00127,attr:{elevation_m:557,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"5_4",lat:34.873355,lng:139.00127,attr:{elevation_m:798,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"5_5",lat:34.933977,lng:139.00127,attr:{elevation_m:786,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"5_6",lat:34.994598,lng:139.00127,attr:{elevation_m:553,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"5_7",lat:35.05522,lng:139.00127,attr:{elevation_m:286,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"5_8",lat:35.115842,lng:139.00127,attr:{elevation_m:337,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"5_9",lat:35.176464,lng:139.00127,attr:{elevation_m:0,terrain_type:0,passable:true,cost:1.0}},
  {hex_id:"6_3",lat:34.782422,lng:139.05377,attr:{elevation_m:624,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"6_4",lat:34.843044,lng:139.05377,attr:{elevation_m:759,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"6_5",lat:34.903666,lng:139.05377,attr:{elevation_m:611,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"6_6",lat:34.964288,lng:139.05377,attr:{elevation_m:573,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"6_7",lat:35.024909,lng:139.05377,attr:{elevation_m:471,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"6_8",lat:35.085531,lng:139.05377,attr:{elevation_m:285,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"6_9",lat:35.146153,lng:139.05377,attr:{elevation_m:234,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"7_4",lat:34.873355,lng:139.10627,attr:{elevation_m:416,terrain_type:1,passable:true,cost:2.0}},
  {hex_id:"7_5",lat:34.933977,lng:139.10627,attr:{elevation_m:442,terrain_type:1,passable:true,cost:2.0}},
];

const LAT_STEP = 0.030311;
const LNG_STEP = 0.0525;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 核心：Voronoi的な正確なセルサイズ計算
//
// このデータの隣接構造：
//   同列上下：dy=LAT_STEP, dx=0
//   斜め隣接：dy=LAT_STEP, dx=LNG_STEP
//   斜め距離 = 2×LAT_STEP（数学的に証明済み）
//
// Pointy-topの6頂点 angle = 30°,90°,150°,210°,270°,330°
// 各辺の法線方向 = 0°,60°,120°,180°,240°,300°
//
// 上下辺の接触：
//   現セル下頂点(270°) の y = cy + ry
//   下セル上頂点(90°) の y  = cy + LAT_STEP*sc - ry
//   接触条件: cy+ry = cy+LAT_STEP*sc-ry → ry = LAT_STEP*sc/2
//
// 斜め辺の接触（右上方向・dx=LNG_STEP,dy=-LAT_STEP）：
//   辺の法線方向 = 30° (Pointy-topの右辺)
//   現セルの右辺頂点: 頂点0(30°)と頂点5(330°)
//     p0 = (rx*cos30°, ry*sin30°) = (rx*√3/2, ry/2)
//     p5 = (rx*cos330°, ry*sin330°) = (rx*√3/2, -ry/2)
//   右上セルの対応辺（左辺）頂点:
//     q2 = (cx+LNG_STEP*sc + rx*cos150°, cy-LAT_STEP*sc + ry*sin150°)
//        = (cx+LNG_STEP*sc - rx*√3/2, cy-LAT_STEP*sc + ry/2)
//     q3 = (cx+LNG_STEP*sc - rx*√3/2, cy-LAT_STEP*sc - ry/2)
//   接触条件:
//     x: rx*√3/2 = LNG_STEP*sc - rx*√3/2 → rx = LNG_STEP*sc/√3
//     y: ry/2 = -LAT_STEP*sc + ry/2 → 0 = -LAT_STEP*sc ← 成立しない！
//
// y方向のずれ = LAT_STEP*sc (同じ量だけずれている)
// これが「このデータは正六角形グリッドでない」証拠
//
// 解決策：Voronoi境界を使う
// セルの「真の境界」= 全隣接セルとの垂直二等分線
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

let mode = 'pointy';
let showDebug = false;
let showGrid = false;
let selCell = null;
let blinkT = 0;
let animId = null;

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const tip = document.getElementById('tip');
const info = document.getElementById('info');

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// スケール計算
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function calcScale() {
  const lats = CELLS.map(c=>c.lat), lngs = CELLS.map(c=>c.lng);
  const b = {
    minLat:Math.min(...lats), maxLat:Math.max(...lats),
    minLng:Math.min(...lngs), maxLng:Math.max(...lngs),
  };
  const W = cv.width, H = cv.height, pad = 45;
  const sc = Math.min(
    (W-pad*2)/(b.maxLng-b.minLng+LNG_STEP*2),
    (H-pad*2)/(b.maxLat-b.minLat+LAT_STEP*2)
  );
  return { b, sc, pad };
}

// lat/lng → canvas pixel（等方スケール）
function toXY(lat, lng, b, sc) {
  return {
    x: (lng - b.minLng) * sc,
    y: (b.maxLat - lat) * sc,
  };
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 六角形サイズ（正確な接触条件から導出）
//
// Pointy-top:
//   ry = LAT_STEP*sc/2   (上下頂点が同列隣接の中間に位置)
//   rx = LNG_STEP*sc/√3  (右辺のx座標が隣列の左辺と一致)
//   ※y方向のずれ(LAT_STEP*sc)は受け入れる
//   ※これが辺の「中点」は一致しないが「端点x座標」は一致する最善解
//
// Flat-top:
//   rx = LNG_STEP*sc/2   (左右頂点が隣列の中間に位置)
//   ry = LAT_STEP*sc/√3
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function hexSize(sc) {
  if (mode === 'pointy') {
    const ry = LAT_STEP * sc / 2;
    const rx = LNG_STEP * sc / Math.sqrt(3);
    return { rx, ry };
  } else {
    const rx = LNG_STEP * sc / 2;
    const ry = LAT_STEP * sc / Math.sqrt(3);
    return { rx, ry };
  }
}

// 六角形の6頂点座標
function hexPts(cx, cy, rx, ry) {
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const a = mode === 'flat'
      ? Math.PI/3 * i
      : Math.PI/3 * i + Math.PI/6;
    pts.push({ x: cx + rx*Math.cos(a), y: cy + ry*Math.sin(a), angle: a });
  }
  return pts;
}

// 辺（6本）の中点と法線
function hexEdges(pts) {
  const edges = [];
  for (let i = 0; i < 6; i++) {
    const a = pts[i], b = pts[(i+1)%6];
    edges.push({
      x1:a.x, y1:a.y, x2:b.x, y2:b.y,
      mx:(a.x+b.x)/2, my:(a.y+b.y)/2,
      // 辺の長さ
      len: Math.hypot(b.x-a.x, b.y-a.y),
      // 法線方向（外向き）
      nx: (a.y-b.y)/Math.hypot(b.x-a.x,b.y-a.y),
      ny: (b.x-a.x)/Math.hypot(b.x-a.x,b.y-a.y),
      idx: i
    });
  }
  return edges;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 描画
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let cache = [];

function draw(t) {
  const W = cv.width, H = cv.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#0a1a0a';
  ctx.fillRect(0,0,W,H);

  const { b, sc, pad } = calcScale();
  const { rx, ry } = hexSize(sc);

  ctx.save();
  ctx.translate(pad, pad);

  cache = [];

  // ── パス1：塗り（全セル）──
  CELLS.forEach(cell => {
    const {x, y} = toXY(cell.lat, cell.lng, b, sc);
    const pts = hexPts(x, y, rx, ry);
    const TCOLORS = {0:'#3d6b4a',1:'#5a4a32',2:'#2a2a3a',3:'#1e4a7a',4:'#1a3060'};
    const color = TCOLORS[cell.attr.terrain_type]||TCOLORS[1];
    const isSel = selCell && selCell.hex_id === cell.hex_id;

    drawHexFill(pts, isSel ? '#1a3a2a' : color);
    cache.push({ cell, cx:x, cy:y, pts, rx, ry });
  });

  // ── パス2：境界線（全セル）──
  CELLS.forEach((cell, idx) => {
    const {x, y} = toXY(cell.lat, cell.lng, b, sc);
    const pts = hexPts(x, y, rx, ry);
    const isSel = selCell && selCell.hex_id === cell.hex_id;

    // 境界線
    ctx.beginPath();
    pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
    ctx.closePath();
    ctx.strokeStyle = isSel ? '#d4a843' : 'rgba(0,0,0,0.6)';
    ctx.lineWidth = isSel ? 2 : 0.8;
    ctx.stroke();
  });

  // ── パス3：選択セルの辺を点滅表示 ──
  if (selCell) {
    const h = cache.find(c=>c.cell.hex_id===selCell.hex_id);
    if (h) {
      const edges = hexEdges(h.pts);
      const blink = (Math.sin(t*0.006)*0.5+0.5); // 0〜1で点滅

      edges.forEach((e, i) => {
        // 辺を点滅線で描画
        ctx.beginPath();
        ctx.moveTo(e.x1, e.y1);
        ctx.lineTo(e.x2, e.y2);
        ctx.setLineDash([3, 3]);
        ctx.strokeStyle = `rgba(255,220,0,${0.4 + blink*0.6})`;
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.setLineDash([]);

        // 辺の中点にラベル
        if (showDebug) {
          ctx.font = '9px monospace';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillStyle = '#ffe06e';
          ctx.fillText(`辺${i}`, e.mx + e.nx*10, e.my + e.ny*10);
        }
      });

      // 頂点を強調
      h.pts.forEach((p, i) => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
        ctx.fillStyle = '#ffe040';
        ctx.fill();
        if (showDebug) {
          ctx.font = '8px monospace';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillStyle = '#fff';
          ctx.fillText(`v${i}`, p.x + Math.cos(p.angle)*12, p.y + Math.sin(p.angle)*12);
        }
      });

      // 隣接セルとの共有辺を赤でハイライト
      highlightSharedEdges(h, t);
    }
  }

  // ── パス4：デバッグ情報 ──
  if (showDebug) drawDebugInfo(b, sc, rx, ry);
  if (showGrid)  drawGridLines(b, sc);

  ctx.restore();
}

// 選択セルと隣接セルの共有辺をハイライト
function highlightSharedEdges(selH, t) {
  const blink = Math.sin(t*0.006)*0.5+0.5;
  const TOL = 2; // ピクセル許容誤差

  const selEdges = hexEdges(selH.pts);

  cache.forEach(other => {
    if (other.cell.hex_id === selH.cell.hex_id) return;
    const otherEdges = hexEdges(other.pts);

    selEdges.forEach((se, si) => {
      otherEdges.forEach((oe, oi) => {
        // 辺の端点が一致するか（許容誤差内）
        const match =
          (Math.hypot(se.x1-oe.x1, se.y1-oe.y1) < TOL && Math.hypot(se.x2-oe.x2, se.y2-oe.y2) < TOL) ||
          (Math.hypot(se.x1-oe.x2, se.y1-oe.y2) < TOL && Math.hypot(se.x2-oe.x1, se.y2-oe.y1) < TOL);

        if (match) {
          // 共有辺を緑でハイライト
          ctx.beginPath();
          ctx.moveTo(se.x1, se.y1);
          ctx.lineTo(se.x2, se.y2);
          ctx.strokeStyle = `rgba(100,255,100,${0.7+blink*0.3})`;
          ctx.lineWidth = 3;
          ctx.stroke();
        } else {
          // 近接しているが一致しない辺を赤で表示
          const dist = Math.min(
            Math.hypot(se.mx-oe.mx, se.my-oe.my),
            Math.hypot(se.x1-oe.x1, se.y1-oe.y1)
          );
          if (dist < 15) { // 近い辺
            ctx.beginPath();
            ctx.moveTo(se.mx, se.my);
            ctx.lineTo(oe.mx, oe.my);
            ctx.strokeStyle = `rgba(255,80,80,0.5)`;
            ctx.lineWidth = 1;
            ctx.setLineDash([2,2]);
            ctx.stroke();
            ctx.setLineDash([]);
          }
        }
      });
    });
  });
}

function drawHexFill(pts, color) {
  ctx.beginPath();
  pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

function drawDebugInfo(b, sc, rx, ry) {
  CELLS.forEach(cell => {
    const {x,y} = toXY(cell.lat, cell.lng, b, sc);
    // 中心点
    ctx.beginPath();
    ctx.arc(x,y,2,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.4)';
    ctx.fill();
    // セルID
    ctx.font='7px monospace';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillStyle='rgba(255,255,255,.3)';
    ctx.fillText(cell.hex_id, x, y);
  });
}

function drawGridLines(b, sc) {
  // 実データの格子線
  ctx.strokeStyle = 'rgba(100,100,255,.15)';
  ctx.lineWidth = 0.5;
  ctx.setLineDash([2,4]);
  // 同列の線
  const cols = [...new Set(CELLS.map(c=>c.lng))].sort();
  cols.forEach(lng => {
    const cells = CELLS.filter(c=>c.lng===lng).sort((a,b)=>a.lat-b.lat);
    if (cells.length < 2) return;
    ctx.beginPath();
    cells.forEach((cell,i) => {
      const {x,y} = toXY(cell.lat, cell.lng, b, sc);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.stroke();
  });
  ctx.setLineDash([]);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// アニメーションループ
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function animate(t) {
  draw(t);
  animId = requestAnimationFrame(animate);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ヒットテスト
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function getHexAt(clientX, clientY) {
  const rect = cv.getBoundingClientRect();
  const { b, sc, pad } = calcScale();
  const px = (clientX - rect.left) * cv.width/rect.width  - pad;
  const py = (clientY - rect.top)  * cv.height/rect.height - pad;
  const { rx, ry } = hexSize(sc);

  for (const h of cache) {
    const pts = h.pts;
    let inside = false;
    for (let i=0,j=5; i<6; j=i++) {
      const [xi,yi]=[pts[i].x,pts[i].y],[xj,yj]=[pts[j].x,pts[j].y];
      if ((yi>py)!==(yj>py) && px<(xj-xi)*(py-yi)/(yj-yi)+xi) inside=!inside;
    }
    if (inside) return h;
  }
  return null;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// イベント
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
cv.addEventListener('click', e => {
  const h = getHexAt(e.clientX, e.clientY);
  if (!h) { selCell=null; updateInfo(); return; }
  selCell = selCell && selCell.hex_id===h.cell.hex_id ? null : h.cell;
  updateInfo(h);
});

cv.addEventListener('mousemove', e => {
  const h = getHexAt(e.clientX, e.clientY);
  if (!h) { tip.style.display='none'; return; }
  const {rx,ry} = hexSize(calcScale().sc);
  tip.style.display='block';
  tip.style.left=(e.clientX+12)+'px';
  tip.style.top=(e.clientY-8)+'px';
  tip.innerHTML=
    `<b>${h.cell.hex_id}</b><br>`+
    `lat=${h.cell.lat.toFixed(5)}<br>`+
    `lng=${h.cell.lng.toFixed(5)}<br>`+
    `rx=${rx.toFixed(1)}px ry=${ry.toFixed(1)}px<br>`+
    `cost=${h.cell.attr.cost}`;
});
cv.addEventListener('mouseleave', ()=>tip.style.display='none');

function updateInfo(h) {
  if (!h) {
    info.textContent = 'セルをタップ→辺が点滅。緑=共有辺 赤点線=ズレの可視化';
    return;
  }
  const { b, sc } = calcScale();
  const { rx, ry } = hexSize(sc);
  info.innerHTML =
    `選択: <b>${h.cell.hex_id}</b> | ` +
    `rx=${rx.toFixed(2)}px ry=${ry.toFixed(2)}px | ` +
    `rx/ry=${(rx/ry).toFixed(4)} | ` +
    `LAT_STEP*sc/2=${(LAT_STEP*sc/2).toFixed(2)} LNG_STEP*sc/√3=${(LNG_STEP*sc/Math.sqrt(3)).toFixed(2)} | ` +
    `<span style="color:#6ee7b7">緑=共有辺接触</span> <span style="color:#f87171">赤=ズレ</span>`;
}

function setMode(m) {
  mode = m;
  document.getElementById('m-pt').classList.toggle('active',m==='pointy');
  document.getElementById('m-fl').classList.toggle('active',m==='flat');
}
function toggleDebug() { showDebug=!showDebug; }
function toggleGrid()  { showGrid=!showGrid; }

window.addEventListener('resize', () => {
  cv.width  = Math.min(880, window.innerWidth-20);
  cv.height = Math.round(cv.width * 0.7);
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 初期化
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
cv.width  = Math.min(880, window.innerWidth-20);
cv.height = Math.round(cv.width * 0.7);
requestAnimationFrame(animate);
</script>
</body>
