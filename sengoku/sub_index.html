<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戦術マップ - サブグリッド</title>
    <link rel="stylesheet" href="../css/map.css">
    <style>
        #header-sub {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: rgba(0, 0, 0, 0.8);
            color: gold;
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 100;
            font-family: serif;
            border-bottom: 2px solid gold;
        }

        #spawn-msg {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(139, 0, 0, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            border: 1px solid gold;
            font-weight: bold;
            z-index: 100;
            display: none;
        }

        #cv-sub {
            background: #0a1a0a;
            width: 100vw;
            height: 100vh;
            display: block;
        }
    </style>
</head>

<body>
    <div id="header-sub">
        <a href="index.html" style="color: gold; text-decoration: none; margin-right: 20px;">◀ 世界地図</a>
        <div id="subgrid-title">読み込み中...</div>
    </div>
    <div id="spawn-msg"></div>
    <canvas id="cv-sub"></canvas>

    <script src="../js/sub_app.js"></script>
</body>

</html>
