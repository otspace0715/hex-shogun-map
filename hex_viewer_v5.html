<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hex-shogun-map ビューワー v5</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0d1117; color:#e6d5b8;
  font-family:'Georgia',serif;
  display:flex; flex-direction:column; align-items:center; min-height:100vh;
}
header {
  width:100%; padding:10px 14px;
  background:#161b22; border-bottom:1px solid #8b6914;
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:6px;
}
h1 { font-size:1rem; color:#d4a843; letter-spacing:.06em; }
.ctrl { display:flex; gap:5px; align-items:center; flex-wrap:wrap; }
.btn {
  background:#1c2128; border:1px solid #4a5568; color:#aab;
  padding:5px 12px; border-radius:3px; cursor:pointer; font-size:.78rem;
  transition:all .15s; white-space:nowrap;
}
.btn.active { background:#8b6914; border-color:#d4a843; color:#0d1117; font-weight:bold; }
.btn.prov { border-color:#2a5a8a; color:#7ab8f5; }
.btn.prov.on { background:#1a3a5c; border-color:#4a90d9; color:#aad4ff; }
.btn.prov.loaded { background:#1a3a2a; border-color:#4a9d6a; color:#7af5aa; }
#wrap { width:100%; max-width:960px; padding:12px; display:flex; flex-direction:column; gap:10px; }
canvas {
  background:#0a1a0a; border:1px solid #2d3748; border-radius:6px;
  max-width:100%; cursor:grab; display:block; touch-action:none;
}
canvas:active { cursor:grabbing; }
.legend { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; font-size:.75rem; }
.li { display:flex; align-items:center; gap:4px; }
.lc { width:13px; height:13px; border-radius:2px; border:1px solid #333; }
#status {
  font-size:.78rem; color:#7ab8f5; background:#1c2128;
  border:1px solid #2d3748; padding:5px 10px; border-radius:3px; text-align:center;
}
#tip {
  position:fixed; background:rgba(10,20,10,.97); border:1px solid #8b6914;
  color:#e6d5b8; padding:7px 10px; border-radius:4px; font-size:.75rem;
  pointer-events:none; display:none; line-height:1.8; z-index:200; max-width:210px;
}
</style>
</head>
<body>
<header>
  <h1>⬡ hex-shogun-map v5</h1>
  <div class="ctrl">
    <span style="font-size:.72rem;color:#666">形式：</span>
    <button class="btn active" id="m-pt" onclick="setMode('pointy')">▲ Pointy</button>
    <button class="btn" id="m-fl" onclick="setMode('flat')">⬡ Flat</button>
    <span style="font-size:.72rem;color:#666;margin-left:6px">国：</span>
    <button class="btn prov" id="p-izu" onclick="toggle('伊豆')">伊豆</button>
    <button class="btn prov" id="p-sag" onclick="toggle('相模')">相模</button>
    <button class="btn prov" id="p-sur" onclick="toggle('駿河')">駿河</button>
    <button class="btn prov" id="p-mus" onclick="toggle('武蔵')">武蔵</button>
    <button class="btn prov" id="p-kai" onclick="toggle('甲斐')">甲斐</button>
    <button class="btn" onclick="fit()">⊙</button>
  </div>
</header>
<div id="wrap">
  <div id="status">国を選択してください</div>
  <canvas id="cv"></canvas>
  <div class="legend">
    <div class="li"><div class="lc" style="background:#3d6b4a"></div>平地</div>
    <div class="li"><div class="lc" style="background:#5a4a32"></div>丘陵</div>
    <div class="li"><div class="lc" style="background:#3a3a4a"></div>山岳(不可)</div>
    <div class="li"><div class="lc" style="background:#1e4a7a"></div>河川</div>
    <div class="li"><div class="lc" style="background:#1a3060"></div>海岸</div>
  </div>
</div>
<div id="tip"></div>

<script>
'use strict';

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  定数
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const LAT_STEP = 0.030311;   // 同列の緯度ピッチ
const LNG_STEP = 0.0525;     // 列間の経度ピッチ
const OVERLAP  = 1.04;       // 隙間ゼロにするためのオーバーラップ率

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  セルサイズ計算
//  等方スケール(scale)で:
//    Pointy: ry = LAT_STEP*scale/2, rx = LNG_STEP*scale/√3
//    Flat:   rx = LNG_STEP*scale/2, ry = LAT_STEP*scale/√3
//  OVERLAP倍することで隣接セルが確実に接触する
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function cellSize(scale, mode) {
  if (mode === 'pointy') {
    return {
      rx: LNG_STEP * scale / Math.sqrt(3) * OVERLAP,
      ry: LAT_STEP * scale / 2             * OVERLAP,
    };
  } else {
    return {
      rx: LNG_STEP * scale / 2             * OVERLAP,
      ry: LAT_STEP * scale / Math.sqrt(3) * OVERLAP,
    };
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  状態
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let mode = 'pointy';
let data = {};    // name → cells[]
let active = {};  // name → bool
let vp   = { ox:0, oy:0, sc:1, baseScale:1 };
let sel  = null;
let cache = [];

const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');
const tip = document.getElementById('tip');
const st  = document.getElementById('status');

const COLORS = { 0:'#3d6b4a', 1:'#5a4a32', 2:'#3a3a4a', 3:'#1e4a7a', 4:'#1a3060' };
const TNAMES = { 0:'平地', 1:'丘陵', 2:'山岳(通行不可)', 3:'河川', 4:'海岸' };
const PROV_TINT = {
  '伊豆': [80,160,100],  '相模': [100,160,80],
  '駿河': [60,100,180],  '武蔵': [180,140,60],  '甲斐': [160,80,160],
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  データ取得
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const PIDS = {
  '伊豆':'izu','相模':'sag','駿河':'sur','武蔵':'mus','甲斐':'kai'
};
async function toggle(name) {
  const btn = document.getElementById('p-' + PIDS[name]);
  if (active[name]) {
    active[name] = false;
    btn.classList.remove('on');
    draw(); updateSt(); return;
  }
  if (!data[name]) {
    btn.textContent = name + ' …';
    try {
      const r = await fetch(
        'https://raw.githubusercontent.com/otspace0715/hex-shogun-map/main/sengoku_hex_data_v2/'
        + encodeURIComponent(name) + '.json'
      );
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const d = await r.json();
      data[name] = d.cells;
      btn.classList.add('loaded');
      btn.textContent = name + ' ✓';
    } catch(e) {
      st.textContent = '❌ ' + name + ' 取得失敗: ' + e.message;
      btn.textContent = name;
      return;
    }
  }
  active[name] = true;
  btn.classList.add('on');
  fit(); updateSt();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  全アクティブセル
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function allCells() {
  const r = [];
  Object.keys(active).forEach(n => {
    if (active[n]) data[n].forEach(c => r.push({c, n}));
  });
  return r;
}
function bounds(cells) {
  const lats = cells.map(x=>x.c.lat), lngs = cells.map(x=>x.c.lng);
  return {
    minLat:Math.min(...lats), maxLat:Math.max(...lats),
    minLng:Math.min(...lngs), maxLng:Math.max(...lngs),
  };
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  フィット
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function fit() {
  const cells = allCells();
  if (!cells.length) return;
  const b  = bounds(cells);
  const W  = cv.width, H = cv.height, pad = 40;
  const dLat = b.maxLat - b.minLat + LAT_STEP * 2;
  const dLng = b.maxLng - b.minLng + LNG_STEP * 2;
  // 等方スケール
  const sc = Math.min((W - pad*2) / dLng, (H - pad*2) / dLat);
  vp = { ox: pad, oy: pad, sc: 1, baseScale: sc };
  draw();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  座標変換（等方・lat/lng → ピクセル）
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function toXY(lat, lng, b, scale) {
  return {
    x: (lng - b.minLng) * scale,
    y: (b.maxLat - lat) * scale,
  };
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  六角形頂点（rx, ry 独立）
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function corners(cx, cy, rx, ry) {
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const a = mode === 'flat'
      ? Math.PI / 3 * i
      : Math.PI / 3 * i + Math.PI / 6;
    pts.push([cx + rx * Math.cos(a), cy + ry * Math.sin(a)]);
  }
  return pts;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  描画
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function draw() {
  const W = cv.width, H = cv.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#0a1a0a';
  ctx.fillRect(0,0,W,H);

  const cells = allCells();
  if (!cells.length) {
    ctx.fillStyle = 'rgba(212,168,67,.4)';
    ctx.font = '13px Georgia'; ctx.textAlign = 'center';
    ctx.fillText('国を選択してください', W/2, H/2);
    return;
  }

  const b  = bounds(cells);
  const sc = vp.baseScale;
  const { rx, ry } = cellSize(sc, mode);

  cache = [];
  ctx.save();
  ctx.translate(vp.ox, vp.oy);
  ctx.scale(vp.sc, vp.sc);

  const multiProv = Object.values(active).filter(Boolean).length > 1;

  cells.forEach(({ c, n }) => {
    const { x, y } = toXY(c.lat, c.lng, b, sc);
    const pts = corners(x, y, rx, ry);

    // ── 地形色ベース ──
    const base = hexToRgb(COLORS[c.attr.terrain_type] || COLORS[1]);

    // ── 標高による明度補正 ──
    const elev = Math.min(c.attr.elevation_m / 1200, 1);
    const br   = Math.round(base[0] * (1 + elev * 0.25));
    const bg   = Math.round(base[1] * (1 + elev * 0.25));
    const bb   = Math.round(base[2] * (1 + elev * 0.25));

    // ── 国ごとの色合い（複数国表示時）──
    let fr = br, fg = bg, fb = bb;
    if (multiProv && PROV_TINT[n]) {
      const t = PROV_TINT[n];
      fr = Math.round(br * 0.65 + t[0] * 0.35);
      fg = Math.round(bg * 0.65 + t[1] * 0.35);
      fb = Math.round(bb * 0.65 + t[2] * 0.35);
    }

    // ── 通行不能は暗く ──
    if (!c.attr.passable) { fr=Math.round(fr*.6); fg=Math.round(fg*.6); fb=Math.round(fb*.6); }

    // ── 選択ハイライト ──
    const isSel = sel === n + ':' + c.hex_id;

    // ── 塗り ──
    path(ctx, pts);
    ctx.fillStyle = isSel
      ? `rgba(255,220,0,.6)`
      : `rgb(${Math.min(fr,255)},${Math.min(fg,255)},${Math.min(fb,255)})`;
    ctx.fill();

    // ── 境界線（移動コスト把握用）──
    path(ctx, pts);
    ctx.strokeStyle = isSel ? '#ffe040' : 'rgba(0,0,0,0.55)';
    ctx.lineWidth   = isSel ? 1.5 / vp.sc : 0.6 / vp.sc;
    ctx.stroke();

    // ── 山岳アイコン ──
    if (!c.attr.passable) {
      const sz = Math.max(6, Math.floor(Math.min(rx,ry) * .7));
      ctx.font = sz + 'px serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(255,255,255,.3)';
      ctx.fillText('⛰', x, y);
    }

    cache.push({ c, n, x, y, pts });
  });

  // ── 国名ラベル（複数表示時）──
  if (multiProv) {
    Object.keys(active).forEach(name => {
      if (!active[name]) return;
      const nc = data[name];
      const cLat = nc.reduce((s,c)=>s+c.lat,0)/nc.length;
      const cLng = nc.reduce((s,c)=>s+c.lng,0)/nc.length;
      const { x, y } = toXY(cLat, cLng, b, sc);
      ctx.font = `bold ${Math.max(10,Math.floor(ry*.9))}px Georgia`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.strokeStyle = 'rgba(0,0,0,.8)'; ctx.lineWidth = 2;
      ctx.strokeText(name, x, y);
      ctx.fillStyle = '#ffe06e';
      ctx.fillText(name, x, y);
    });
  }

  ctx.restore();
}

function path(ctx, pts) {
  ctx.beginPath();
  pts.forEach((p,i) => i===0 ? ctx.moveTo(p[0],p[1]) : ctx.lineTo(p[0],p[1]));
  ctx.closePath();
}

function hexToRgb(h) {
  return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  ヒットテスト
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function hexAt(clientX, clientY) {
  const rect = cv.getBoundingClientRect();
  const px = ((clientX - rect.left) * cv.width  / rect.width  - vp.ox) / vp.sc;
  const py = ((clientY - rect.top)  * cv.height / rect.height - vp.oy) / vp.sc;
  for (const h of cache) {
    let inside = false;
    const ps = h.pts;
    for (let i=0,j=5; i<6; j=i++) {
      const [xi,yi]=ps[i],[xj,yj]=ps[j];
      if ((yi>py)!==(yj>py) && px<(xj-xi)*(py-yi)/(yj-yi)+xi) inside=!inside;
    }
    if (inside) return h;
  }
  return null;
}

function showTip(h, cx, cy) {
  const a = h.c.attr;
  tip.style.display = 'block';
  tip.style.left = (cx+12)+'px';
  tip.style.top  = (cy-8)+'px';
  tip.innerHTML =
    `<b>${h.n} / ${h.c.hex_id}</b><br>` +
    `地形：${TNAMES[a.terrain_type]||'?'}<br>` +
    `標高：${a.elevation_m}m<br>` +
    `移動コスト：<b style="color:${a.cost>5?'#f87171':a.cost>1.5?'#fbbf24':'#6ee7b7'}">${a.cost}</b><br>` +
    `通行：${a.passable?'✓':'<span style="color:#f87171">✗ 不可</span>'}<br>` +
    `<span style="font-size:.68rem;color:#666">${h.c.lat.toFixed(5)}, ${h.c.lng.toFixed(5)}</span>`;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  モード切替
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function setMode(m) {
  mode = m;
  document.getElementById('m-pt').classList.toggle('active', m==='pointy');
  document.getElementById('m-fl').classList.toggle('active', m==='flat');
  if (allCells().length) { fit(); updateSt(); }
}

function updateSt() {
  const names = Object.keys(active).filter(n=>active[n]);
  const total = names.reduce((s,n)=>s+data[n].length,0);
  st.textContent = names.length
    ? `✓ ${names.join(' + ')}　${total}セル　${mode==='pointy'?'▲ Pointy':'⬡ Flat'}　overlap×${OVERLAP}`
    : '国を選択してください';
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  イベント
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
cv.addEventListener('mousemove', e => {
  const h = hexAt(e.clientX, e.clientY);
  if (!h) { tip.style.display='none'; return; }
  showTip(h, e.clientX, e.clientY);
});
cv.addEventListener('mouseleave', () => tip.style.display='none');
cv.addEventListener('click', e => {
  const h = hexAt(e.clientX, e.clientY);
  if (!h) return;
  sel = sel===n+':'+h.c.hex_id ? null : h.n+':'+h.c.hex_id;
  draw(); showTip(h, e.clientX, e.clientY);
});

// マウスパン
let md=false, mx=0, my=0;
cv.addEventListener('mousedown', e=>{md=true;mx=e.clientX;my=e.clientY;});
window.addEventListener('mousemove', e=>{
  if(!md)return;
  vp.ox+=e.clientX-mx; vp.oy+=e.clientY-my; mx=e.clientX; my=e.clientY; draw();
});
window.addEventListener('mouseup', ()=>md=false);

// ホイールズーム
cv.addEventListener('wheel', e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.15:1/1.15;
  const r=cv.getBoundingClientRect();
  const lx=e.clientX-r.left, ly=e.clientY-r.top;
  vp.ox=lx-(lx-vp.ox)*f; vp.oy=ly-(ly-vp.oy)*f;
  vp.sc=Math.max(.2,Math.min(12,vp.sc*f));
  draw();
},{passive:false});

// タッチ
let ts=null, ld=0;
cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===1) ts={x:e.touches[0].clientX,y:e.touches[0].clientY,ox:vp.ox,oy:vp.oy};
},{passive:false});
cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&ts){
    vp.ox=ts.ox+(e.touches[0].clientX-ts.x);
    vp.oy=ts.oy+(e.touches[0].clientY-ts.y);
    draw();
  } else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                       e.touches[0].clientY-e.touches[1].clientY);
    if(ld){ vp.sc=Math.max(.2,Math.min(12,vp.sc*(d/ld))); draw(); }
    ld=d;
  }
},{passive:false});
cv.addEventListener('touchend',()=>{ts=null;ld=0;});

window.addEventListener('resize',()=>{
  cv.width=Math.min(928,window.innerWidth-28);
  cv.height=Math.round(cv.width*.62);
  if(allCells().length) fit(); else draw();
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  初期化
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
cv.width  = Math.min(928, window.innerWidth-28);
cv.height = Math.round(cv.width * .62);
draw();
toggle('伊豆');
</script>
