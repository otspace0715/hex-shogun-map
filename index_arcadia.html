<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>⬡ アルカディア大陸</title>
  <link rel="stylesheet" href="css/map.css">
  <style>
    body    { background: #0a0818; }
    #header { background: rgba(10,8,24,0.95); border-bottom-color: rgba(100,60,180,0.4); }
    #ver    { color: #a070ff; }
    .btn    { background: rgba(20,10,50,0.8); border-color: rgba(100,60,200,0.5); color: #c0a0ff; }
    .btn.active,.btn.on { background: rgba(60,20,140,0.9); border-color: rgba(150,100,255,0.8); }
    .btn.ok { border-color: rgba(100,200,100,0.7); }
    #status { background: rgba(10,8,24,0.95); color: #9060df; border-bottom-color: rgba(60,20,100,0.4); }
    #cvwrap { background: #0a0818; }
  </style>
</head>
<body>
  <div id="header">
    <span id="ver">⬡ アルカディア大陸</span>
    <button class="btn active" id="m-pt">▲ Pointy</button>
    <button class="btn"        id="m-fl">○ Flat</button>
    <!-- 王国ボタン: data-prov + data-id で定義 -->
    <button class="btn prov-btn" data-prov="黄金王国アウロス"  data-id="aur">黄金王国</button>
    <button class="btn prov-btn" data-prov="銀月王国シルヴァ"  data-id="sil">銀月王国</button>
    <button class="btn prov-btn" data-prov="炎帝国イグニス"    data-id="ign">炎帝国</button>
    <button class="btn prov-btn" data-prov="翠森共和国ヴェルデ" data-id="ver">翠森共和国</button>
    <button class="btn prov-btn" data-prov="深海神聖マレア"    data-id="mar">深海神聖</button>
    <button class="btn prov-btn" data-prov="暗黒領主ウンブラ"  data-id="umb">暗黒領主</button>
    <button class="btn" id="btn-fit">⊙</button>
    <!-- GPS不要（架空世界のため） -->
  </div>
  <div id="status">王国を選んでください</div>
  <div id="cvwrap"><canvas id="cv"></canvas></div>
  <div id="tooltip" style="display:none"></div>

  <script>
    // ← このURLを変えるだけで世界が切り替わる
    window.WORLD_OVERRIDE_URL =
      'https://raw.githubusercontent.com/otspace0715/hex-shogun-map/main/world_arcadia.json';
  </script>
  <script src="js/app.js"></script>
</body>
</html>
